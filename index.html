<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 保留原有的head部分内容 -->
    <!-- 新增二维码扫描功能所需的库 -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script> 
    <style>
        /* 新增的二维码扫描区域样式 */
        .qr-scanner {
            margin: 30px auto;
            max-width: 500px;
            text-align: center;
        }
        
        .scanner-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        #qr-video {
            width: 100%;
            border: 3px solid var(--secondary);
            border-radius: 5px;
        }
        
        .scan-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        
        .scan-btn:hover {
            background: #c0392b;
        }
        
        .file-list {
            margin: 30px auto;
            max-width: 800px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        .file-list h3 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .file-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-link {
            color: var(--secondary);
            text-decoration: none;
            flex-grow: 1;
        }
        
        .file-link:hover {
            text-decoration: underline;
        }
        
        .file-delete {
            color: var(--accent);
            cursor: pointer;
            margin-left: 15px;
        }
        
        .no-files {
            color: #777;
            text-align: center;
            padding: 20px;
        }
        
        /* 扫描框指示线动画 */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(231, 76, 60, 0.8);
            animation: scan 2s infinite linear;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }
        
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <!-- 保留原有的header和其他部分 -->
    
    <!-- 在适当位置添加二维码扫描功能部分 -->
    <section class="qr-section">
        <div class="container">
            <div class="section-title">
                <h2>文件二维码扫描器</h2>
            </div>
            
            <div class="qr-scanner">
                <div class="scanner-container">
                    <video id="qr-video" playsinline></video>
                    <div class="scan-line" id="scan-line"></div>
                </div>
                <button class="scan-btn" id="start-scan">开始扫描</button>
                <button class="scan-btn" id="stop-scan" style="display: none;">停止扫描</button>
            </div>
            
            <div class="file-list">
                <h3>扫描到的文件</h3>
                <div id="file-list-container">
                    <p class="no-files">暂无扫描到的文件</p>
                </div>
            </div>
        </div>
    </section>
    
    <!-- 保留原有的其他部分 -->
    
    <script>
        // 二维码扫描功能实现
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('qr-video');
            const startBtn = document.getElementById('start-scan');
            const stopBtn = document.getElementById('stop-scan');
            const fileListContainer = document.getElementById('file-list-container');
            const scanLine = document.getElementById('scan-line');
            
            let scanning = false;
            let stream = null;
            
            // 存储扫描到的文件
            let scannedFiles = JSON.parse(localStorage.getItem('scannedFiles')) || [];
            
            // 初始化显示文件列表 
            updateFileList();
            
            // 开始扫描按钮点击事件
            startBtn.addEventListener('click', startScanning);
            
            // 停止扫描按钮点击事件 
            stopBtn.addEventListener('click', stopScanning);
            
            // 开始扫描 
            function startScanning() {
                scanning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                scanLine.style.display = 'block';
                
                // 请求摄像头权限
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(function(s) {
                        stream = s;
                        video.srcObject = stream;
                        video.play();
                        requestAnimationFrame(tick);
                    })
                    .catch(function(err) {
                        console.error("无法访问摄像头:", err);
                        alert("无法访问摄像头，请确保已授予摄像头权限");
                        stopScanning();
                    });
            }
            
            // 停止扫描
            function stopScanning() {
                scanning = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                scanLine.style.display = 'none';
                
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
            }
            
            // 扫描处理 
            function tick() {
                if (!scanning) return;
                
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });
                    
                    if (code) {
                        // 检查是否是文件路径格式 
                        if (isValidFilePath(code.data)) {
                            addScannedFile(code.data);
                        } else {
                            alert("扫描到的二维码不是有效的文件路径");
                        }
                    }
                }
                
                requestAnimationFrame(tick);
            }
            
            // 验证文件路径格式 
            function isValidFilePath(path) {
                // 简单的路径格式验证，您可以根据需要调整
                const regex = /^[a-zA-Z]:\\(?:[^\\/:*?"<>|\r\n]+\\)*[^\\/:*?"<>|\r\n]*$/; // Windows路径 
                // 或者 /^\/(?:[^\/:*?"<>|\r\n]+\/)*[^\/:*?"<>|\r\n]*$/; // Unix路径 
                return regex.test(path);
            }
            
            // 添加扫描到的文件 
            function addScannedFile(filePath) {
                // 检查是否已存在 
                if (!scannedFiles.some(file => file.path === filePath)) {
                    const fileName = filePath.split('\\').pop().split('/').pop();
                    scannedFiles.unshift({
                        name: fileName,
                        path: filePath,
                        timestamp: new Date().toLocaleString()
                    });
                    
                    // 保存到本地存储
                    localStorage.setItem('scannedFiles', JSON.stringify(scannedFiles));
                    
                    // 更新列表显示
                    updateFileList();
                    
                    // 可选: 扫描成功后自动停止
                    stopScanning();
                }
            }
            
            // 更新文件列表显示
            function updateFileList() {
                if (scannedFiles.length === 0) {
                    fileListContainer.innerHTML = '<p class="no-files">暂无扫描到的文件</p>';
                    return;
                }
                
                fileListContainer.innerHTML = scannedFiles.map(file => `
                    <div class="file-item">
                        <a href="#" class="file-link" data-path="${encodeURIComponent(file.path)}">
                            ${file.name} <small>(${file.timestamp})</small>
                        </a>
                        <span class="file-delete" data-path="${encodeURIComponent(file.path)}">×</span>
                    </div>
                `).join('');
                
                // 添加文件点击事件 
                document.querySelectorAll('.file-link').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const filePath = decodeURIComponent(this.getAttribute('data-path'));
                        openFile(filePath);
                    });
                });
                
                // 添加删除按钮事件
                document.querySelectorAll('.file-delete').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const filePath = decodeURIComponent(this.getAttribute('data-path'));
                        removeFile(filePath);
                    });
                });
            }
            
            // 打开文件 
            function openFile(filePath) {
                // 注意: 浏览器出于安全限制，不能直接访问本地文件系统
                // 这里提供两种解决方案:
                
                // 1. 如果是Web应用，文件应该在服务器上 
                // window.open(`file://${filePath}`); // 通常会被浏览器阻止 
                
                // 2. 更现实的方案是显示路径并提示用户手动打开
                alert(`文件路径: ${filePath}\n\n由于浏览器安全限制，请手动在文件资源管理器中打开此文件。`);
                
                // 3. 如果是Electron等桌面应用，可以使用node.js的fs模块 
                // const { shell } = require('electron');
                // shell.openPath(filePath);
            }
            
            // 删除文件记录 
            function removeFile(filePath) {
                scannedFiles = scannedFiles.filter(file => file.path !== filePath);
                localStorage.setItem('scannedFiles', JSON.stringify(scannedFiles));
                updateFileList();
            }
        });
    </script>
</body>
</html>
